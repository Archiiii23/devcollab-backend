<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DevCollab API</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:48px 24px;color:#1f2937;background:#f9fafb;display:flex;align-items:center;justify-content:center;min-height:100vh}
      .box{max-width:560px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:32px}
      h1{margin:0 0 12px;font-size:22px}
      code{background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:13px}
      p{line-height:1.55}
      a{color:#2563eb}

  </head>
  <body>
    <div class="box">
      <h1>DevCollab API</h1>
      <p>This domain hosts the DevCollab MERN backend. There is no UI here — point your frontend's <code>VITE_API_URL</code> at this host.</p>
      <p>Health check: <a href="/health">/health</a></p>
    </div>
  </body>
</html>
